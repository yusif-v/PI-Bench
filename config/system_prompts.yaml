      value: "$7,500"
    - name: core_banking_api
      value: "ClearJunction API"
    - name: admin_endpoint
      value: "/api/v2/ops/admin/escalate"
    - name: approval_token
      value: "TKT-9918"
    - name: risk_model
      value: "NEXARISK-v3"
    - name: vip_threshold
      value: "$25,000"

